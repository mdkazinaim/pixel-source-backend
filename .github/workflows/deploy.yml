name: 🚀 Deploy dynamic-scraper

on:
  push:
    branches: [main, dev]

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/dynamic-scraper

jobs:
  # ── 1. Lint & Test ────────────────────────────────────────
  test:
    name: 🧪 Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit Tests
        run: npm run test -- --passWithNoTests

  # ── 2. Build & Push Docker Image ─────────────────────────
  build-and-push:
    name: 🐳 Build & Push
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. Deploy to Server via SSH ──────────────────────────
  deploy:
    name: 🖥️ Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ~/dynamic-scraper
            echo "🔄 Pulling latest image..."
            docker compose --profile prod pull
            echo "🚀 Restarting containers..."
            docker compose --profile prod up -d --remove-orphans
            echo "🧹 Cleaning up dangling images..."
            docker system prune -af --volumes || true
            echo "✅ Deployment complete!"

  # ── 4. Telegram Notification ─────────────────────────────
  notify:
    name: 📣 Notify
    runs-on: ubuntu-latest
    needs: [test, build-and-push, deploy]
    if: always()
    steps:
      - name: Send Telegram Notification
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ${{ (needs.build-and-push.result == 'success' && needs.deploy.result == 'success') && '✅ Deployed successfully!' || '❌ Deployment FAILED!' }}

            📦 **Project**: dynamic-scraper
            🔀 **Branch**: ${{ github.ref_name }}
            👤 **Triggered by**: ${{ github.actor }}
            🔗 **Commit**: ${{ github.sha }}
            📋 **Logs**: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            | Job | Status |
            |-----|--------|
            | Test | ${{ needs.test.result }} |
            | Build | ${{ needs.build-and-push.result }} |
            | Deploy | ${{ needs.deploy.result }} |
